<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IELTS LISTENING SCRIPT STRUCTURE — BRUTALISM</title>
    <style>
        /* BRUTALIST CORE */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #ffffff;
            font-family: 'Courier New', 'IBM Plex Mono', 'Fira Code', monospace;
            font-size: 18px;
            line-height: 1.5;
            color: #000000;
            padding: 2rem;
        }

        /* main container – brutal grid */
        .brutal-container {
            max-width: 1600px;
            margin: 0 auto;
            border: 3px solid #000;
            background: #fff;
            box-shadow: 8px 8px 0 rgba(0,0,0,0.2);
        }

        /* header */
        .brutal-header {
            border-bottom: 3px solid #000;
            padding: 1.5rem;
            background: #f5f5f5;
        }
        .brutal-header h1 {
            font-size: 2rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            text-transform: uppercase;
            margin: 0;
        }
        .brutal-header p {
            margin-top: 0.5rem;
            font-size: 0.8rem;
            color: #333;
        }

        /* navigation row */
        .brutal-nav {
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            padding: 1.5rem;
            background: #fff;
            border-bottom: 3px solid #000;
            align-items: flex-end;
        }
        .nav-group {
            display: flex;
            flex-direction: column;
            gap: 0.25rem;
            min-width: 160px;
        }
        .nav-group label {
            font-weight: 700;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        select, button {
            font-family: 'Courier New', monospace;
            background: #fff;
            border: 2px solid #000;
            padding: 8px 12px;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            transition: none;
        }
        select:focus, button:focus {
            outline: none;
            background: #000;
            color: #fff;
        }
        button {
            background: #000;
            color: #fff;
            text-transform: uppercase;
            margin-top: 0.5rem;
        }
        button:active {
            transform: translate(2px, 2px);
            box-shadow: none;
        }

        /* two-column brutal layout */
        .brutal-split {
            display: flex;
            flex-wrap: wrap;
            border-bottom: 3px solid #000;
        }
        .script-panel {
            flex: 1;
            min-width: 280px;
            border-right: 3px solid #000;
            background: #fefefe;
        }
        .questions-panel {
            flex: 1;
            min-width: 320px;
            background: #fff;
        }
        .panel-title {
            font-weight: 700;
            background: #eee;
            padding: 1rem;
            border-bottom: 2px solid #000;
            text-transform: uppercase;
            font-size: 0.8rem;
        }
        .scroll-area {
            height: 500px;
            overflow-y: auto;
            padding: 1.2rem;
        }
        .script-content {
            white-space: pre-wrap;
            font-family: 'Courier New', monospace;
            font-size: 0.85rem;
        }
        .question-group {
            margin-bottom: 2rem;
            border-bottom: 1px solid #ccc;
            padding-bottom: 1.2rem;
        }
        .question-group h4 {
            font-weight: 700;
            margin-bottom: 1rem;
            background: #000;
            color: #fff;
            display: inline-block;
            padding: 0.2rem 0.6rem;
            font-size: 0.7rem;
            letter-spacing: 1px;
        }
        .question-item {
            margin-bottom: 1.5rem;
            border-left: 2px solid #000;
            padding-left: 0.8rem;
        }
        .question-text {
            font-weight: 600;
            margin-bottom: 0.5rem;
        }
        input[type="text"], .mcq-group label, select.match-select {
            font-family: monospace;
        }
        input[type="text"] {
            width: 100%;
            padding: 8px;
            border: 2px solid #000;
            background: #fff;
            margin-top: 5px;
        }
        .mcq-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
            margin-top: 6px;
        }
        .mcq-group label {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
        }
        select.match-select {
            width: 100%;
            padding: 6px;
            margin-top: 4px;
            border: 2px solid #000;
        }
        .feedback-area {
            margin-top: 1.2rem;
            padding: 1rem;
            background: #f0f0f0;
            border-left: 4px solid #000;
            font-size: 0.8rem;
        }
        .warning-note {
            color: #d14423;
            font-weight: bold;
        }
        hr {
            border-top: 2px solid #000;
            margin: 1rem 0;
        }
        footer {
            padding: 1rem;
            text-align: center;
            background: #f5f5f5;
            border-top: 3px solid #000;
            font-size: 0.7rem;
        }
        @media (max-width: 800px) {
            .brutal-split {
                flex-direction: column;
            }
            .script-panel {
                border-right: none;
                border-bottom: 3px solid #000;
            }
        }
    </style>
</head>
<body>
<div class="brutal-container">
    <div class="brutal-header">
        <h1>IELTS LISTENING SCRIPT STRUCTURE</h1>
        <p>brutalist interface · full control · part / topic / case · answer validation</p>
    </div>

    <div class="brutal-nav">
        <div class="nav-group">
            <label>PART</label>
            <select id="partSelect"></select>
        </div>
        <div class="nav-group">
            <label>TOPIC</label>
            <select id="topicSelect"></select>
        </div>
        <div class="nav-group">
            <label>CASE</label>
            <select id="caseSelect"></select>
        </div>
        <div class="nav-group">
            <button id="checkAnswersBtn">CHECK ANSWERS</button>
        </div>
    </div>

    <div class="brutal-split">
        <!-- LEFT: SCRIPT PANEL -->
        <div class="script-panel">
            <div class="panel-title">[ SCRIPT ]</div>
            <div class="scroll-area" id="scriptContainer">
                <div class="script-content" id="scriptText">
                    <!-- script will be injected here -->
                    Select a part, topic and case.
                </div>
            </div>
        </div>

        <!-- RIGHT: QUESTIONS PANEL -->
        <div class="questions-panel">
            <div class="panel-title">[ QUESTIONS ]</div>
            <div class="scroll-area" id="questionsContainer">
                <!-- dynamic questions will appear here (completion, MCQ, matching) -->
            </div>
            <div id="feedbackArea" class="feedback-area"></div>
        </div>
    </div>
    <footer>brutalist framework · each case contains script + questions + vocabulary/collocation · check answers only when all answered</footer>
</div>

                            script: "Tutor: Good morning, team. Let's discuss the methodology for your environmental science assignment. Sarah, you've been analyzing the carbon footprint survey results?\nSarah: Yes. We collected 200 responses, but I'm concerned about the sample bias – most participants were university students.\nTutor: That's a valid point. How did you distribute the questionnaire?\nJames: We used social media and emailed the faculty list. So mainly young adults.\nTutor: For the final report, you must address this limitation. What about the transport data?\nSarah: We asked about daily commute distance and mode. The majority use buses or bicycles, but 30% said they drive alone.\nTutor: Interesting. When you compare with national averages, car usage is lower here. Any plans to visualise the data?\nJames: We'll create a bar chart showing transport mode by age group. Also a line graph for carbon emissions over the week.\nTutor: Great. The discussion section should mention that campus location encourages sustainable travel. Don't forget to reference the local council's 2023 transport report.\nSarah: Already found it. We're also thinking of adding a recommendation for a carpool scheme.\nTutor: Excellent. I'd like you to prepare a 10-minute presentation as well. Focus on three key findings. Now, any issues with the timeline?\nJames: The data analysis is almost done, but we need two more days for the graphs.\nTutor: That's fine. Submit the draft by Friday 5pm. And short answers to the peer review questions? \nSarah: We'll complete them tomorrow. Thanks, tutor.",

        part1: {
    name: "Part 1 – Social context",
    topics: {
        "Accommodation": {
            cases: {
                    "Case 1 – Renting a flat (City Centre)": {
      "script": "Agent: Good morning, City Rentals. How may I help you?\nClient: I'm looking for a one-bedroom flat in the city centre. My budget is around 1200 per month.\nAgent: I have a flat on Grove Street. Rent is 1150, plus bills. It has a modern kitchen and a balcony.\nClient: Is it furnished?\nAgent: Partly. Bed and wardrobe are included, but you'll need a sofa and table.\nClient: And the deposit?\nAgent: One month's rent, so 1150. You'll also need a reference from your employer.\nClient: When can I view it?\nAgent: Tomorrow at 11 a.m. Please bring identification.\nClient: Great. I'll text you my name and number.\nAgent: Perfect. I'll send you the address by text.",

	"Case 4 – Hotel booking for business trip": {
      "script": "Receptionist: Grand Hotel, good morning. How may I assist?\nGuest: I need a single room for two nights, from Monday 14th to Wednesday 16th.\nReceptionist: We have a standard single at £119 per night, or executive at £159 with breakfast.\nGuest: Standard is fine. Does it have a desk?\nReceptionist: Yes, and free wifi. Check-in from 2 p.m., check-out by 11 a.m.\nGuest: I'll need a wake-up call at 7 a.m. on Wednesday.\nReceptionist: Noted. Do you need parking?\nGuest: Yes, how much?\nReceptionist: £12 per day. Could I have your credit card to guarantee?\nGuest: Sure. My name is David Chen.\nReceptionist: Thank you. Booking confirmed.",

	"Case 19 – Renting a luxury penthouse": {
      "script": "Broker: Luxury Living Realty, good evening.\nClient: I'm interested in the penthouse overlooking the river. For 1 year, starting September.\nBroker: Excellent choice. Rent is £4500 per month, including concierge, gym, pool and two parking spaces.\nClient: Is the penthouse furnished?\nBroker: It comes with designer furniture, but we can remove if you prefer your own.\nClient: I'll keep the furniture. What about utilities?\nBroker: Electricity and gas separate, approx £250. Water and heating included.\nClient: Can I have a private rooftop terrace?\nBroker: Yes, with a hot tub and barbecue. Also a home cinema room.\nClient: I'll take it. Let's sign tomorrow.",

        part2: { name: "Part 2 – Monologue", topics: {
	"Tourist attractions": {cases: {}},

} },
        part4: { name: "Part 4 – Lecture", topics: {
	"Environment/ Climate change": {cases: {}},
	"History/ Archaeology": {cases: {}},
	"Biology/ Animal behavior": {cases: {}},
	"Business/ Econnomics": {cases: {}},
	"Technology/ Innovation": {cases: {}},
	"Health/ Medicine": {cases: {}},
	"Education/ Psychology": {cases: {}},
	"Sociology/ Urban planning": {cases: {}}
} }
    };

    // For demo, we only have one topic with one case inside part3
    // To make dropdown work, populate part3 topic list with 5 topics (some have dummy cases)
    const topicNames = [
        "Environmental Science Project", 
        "Renewable Energy Debate", 
        "Marketing Research Interview", 
        "Psychology Study Design", 
        "Urban Planning Fieldwork"
    ];
    // ensure that each topic at least has an empty case structure (for display)
    topicNames.forEach(topic => {
        if (!LISTENING_DB.part3.topics[topic]) {
            LISTENING_DB.part3.topics[topic] = { cases: {} };
        }
        // add at least one dummy case for topics that have no real data
        if (Object.keys(LISTENING_DB.part3.topics[topic].cases).length === 0) {
            LISTENING_DB.part3.topics[topic].cases = {
                "Case 1 – Example script": {
                    script: "This is a placeholder script for topic: " + topic + ". Please add full script later.",
                    questions: {
                        mcq: [{ id: "mcq_dummy", text: "Sample MCQ question", options: ["A", "B", "C"], answer: "A" }],
                        matching: { items: [{ id: "dm", text: "Dummy match", options: ["opt1"], answer: "opt1" }] },
                        completion: [{ id: "dc", text: "Fill blank: _______________", answer: "example" }],
                        sentenceCompletion: [],
                        shortAnswer: []
                    },
                    vocabCollocation: "temp vocabulary"
                }
            };
        }
    });

    // populate part dropdown (only part3 is filled for demo, but we show all 4)
    const partSelect = document.getElementById('partSelect');
    const topicSelect = document.getElementById('topicSelect');
    const caseSelect = document.getElementById('caseSelect');
    const scriptContainer = document.getElementById('scriptText');
    const questionsContainer = document.getElementById('questionsContainer');
    const feedbackDiv = document.getElementById('feedbackArea');

    let currentPartKey = 'part3';      // default part3
    let currentTopicName = topicNames[0];
    let currentCaseKey = 'Case 1 – Carbon footprint survey';   // only valid for first topic

    // ---- helper: get current case object ----
    function getCurrentCase() {
        const part = LISTENING_DB[currentPartKey];
        if (!part) return null;
        const topic = part.topics[currentTopicName];
        if (!topic) return null;
        const caseObj = topic.cases[currentCaseKey];
        return caseObj || null;
    }

    // ---- populate part dropdown (show part1-part4) ----
    function populateParts() {
        const parts = ['part1', 'part2', 'part3', 'part4'];
        partSelect.innerHTML = '';
        parts.forEach(part => {
            const opt = document.createElement('option');
            opt.value = part;
            let label = '';
            if (part === 'part1') label = 'Part 1 – Form/Note/Table/MCQ/Matching';
            else if (part === 'part2') label = 'Part 2 – Note/Sentence/MCQ/Matching/Map/Diagram';
            else if (part === 'part3') label = 'Part 3 – MCQ/Matching/Completion/Short Answer';
            else label = 'Part 4 – Summary/MCQ/Table/Short Answer';
            opt.textContent = label;
            if (part === currentPartKey) opt.selected = true;
            partSelect.appendChild(opt);
        });
    }

    // refresh topic dropdown based on selected part (only part3 has data, rest are placeholders)
    function populateTopics() {
        const partData = LISTENING_DB[currentPartKey];
        if (!partData || !partData.topics) {
            topicSelect.innerHTML = '<option>No topics</option>';
            return;
        }
        const topicKeys = Object.keys(partData.topics);
        topicSelect.innerHTML = '';
        topicKeys.forEach(topic => {
            const opt = document.createElement('option');
            opt.value = topic;
            opt.textContent = topic;
            if (topic === currentTopicName) opt.selected = true;
            topicSelect.appendChild(opt);
        });
        if (topicKeys.length === 0) {
            topicSelect.innerHTML = '<option>No topics</option>';
        }
        populateCases();
    }

    // populate case dropdown from current topic (1-20 cases but we may have less)
    function populateCases() {
        const partData = LISTENING_DB[currentPartKey];
        if (!partData || !partData.topics[currentTopicName]) {
            caseSelect.innerHTML = '<option>No cases</option>';
            return;
        }
        const casesObj = partData.topics[currentTopicName].cases;
        const caseKeys = Object.keys(casesObj);
        caseSelect.innerHTML = '';
        if (caseKeys.length === 0) {
            const dummyOpt = document.createElement('option');
            dummyOpt.textContent = 'No cases';
            caseSelect.appendChild(dummyOpt);
            return;
        }
        caseKeys.forEach(ck => {
            const opt = document.createElement('option');
            opt.value = ck;
            opt.textContent = ck;
            if (ck === currentCaseKey) opt.selected = true;
            caseSelect.appendChild(opt);
        });
        // sync currentCaseKey
        if (!caseKeys.includes(currentCaseKey) && caseKeys.length) currentCaseKey = caseKeys[0];
        renderCurrentCase();
    }

    // ---- render script + questions + vocabs ----
    function renderCurrentCase() {
        const caseData = getCurrentCase();
        if (!caseData) {
            scriptContainer.innerText = 'No script available for this selection.';
            questionsContainer.innerHTML = '<div class="question-item">No questions defined.</div>';
            feedbackDiv.innerHTML = '';
            return;
        }
        // script
        scriptContainer.innerText = caseData.script || '(script missing)';
        
        // build questions HTML based on question types (Part 3 has all: MCQ, matching, completion, sentence completion, short answer)
        const q = caseData.questions;
        let html = '';
        
        // ----- MCQ section -----
        if (q.mcq && q.mcq.length) {
            html += `<div class="question-group"><h4>MULTIPLE CHOICE</h4>`;
            q.mcq.forEach((mcqItem, idx) => {
                html += `<div class="question-item" data-type="mcq" data-idx="${idx}" data-answer="${mcqItem.answer}">
                            <div class="question-text">${mcqItem.text}</div>
                            <div class="mcq-group">`;
                mcqItem.options.forEach(opt => {
                    html += `<label><input type="radio" name="mcq_${idx}" value="${opt}"> ${opt}</label>`;
                });
                html += `</div></div>`;
            });
            html += `</div>`;
        }
        
        // ----- MATCHING section (dropdowns) -----
        if (q.matching && q.matching.items && q.matching.items.length) {
            html += `<div class="question-group"><h4>MATCHING</h4>`;
            q.matching.items.forEach((matchItem, idx) => {
                html += `<div class="question-item" data-type="matching" data-idx="${idx}" data-answer="${matchItem.answer}">
                            <div class="question-text">${matchItem.text}</div>
                            <select class="match-select" data-correct="${matchItem.answer}">
                                <option value="">-- select --</option>`;
                matchItem.options.forEach(opt => {
                    html += `<option value="${opt}">${opt}</option>`;
                });
                html += `</select></div>`;
            });
            html += `</div>`;
        }
        
        // ----- completion (fill in blank) textbox -----
        if (q.completion && q.completion.length) {
            html += `<div class="question-group"><h4>NOTE / TABLE COMPLETION</h4>`;
            q.completion.forEach((comp, idx) => {
                html += `<div class="question-item" data-type="completion" data-idx="${idx}" data-answer="${comp.answer.toLowerCase()}">
                            <div class="question-text">${comp.text}</div>
                            <input type="text" class="fill-input" placeholder="type answer" data-correct="${comp.answer.toLowerCase()}">
                        </div>`;
            });
            html += `</div>`;
        }
        
        // ----- sentence completion (also textbox, but separate semantic) -----
        if (q.sentenceCompletion && q.sentenceCompletion.length) {
            html += `<div class="question-group"><h4>SENTENCE COMPLETION</h4>`;
            q.sentenceCompletion.forEach((sent, idx) => {
                html += `<div class="question-item" data-type="sentComp" data-idx="${idx}" data-answer="${sent.answer.toLowerCase()}">
                            <div class="question-text">${sent.text}</div>
                            <input type="text" class="fill-input" data-correct="${sent.answer.toLowerCase()}">
                        </div>`;
            });
            html += `</div>`;
        }
        
        // ----- short answer questions (textbox) -----
        if (q.shortAnswer && q.shortAnswer.length) {
            html += `<div class="question-group"><h4>SHORT ANSWER QUESTIONS</h4>`;
            q.shortAnswer.forEach((short, idx) => {
                html += `<div class="question-item" data-type="short" data-idx="${idx}" data-answer="${short.answer.toLowerCase()}">
                            <div class="question-text">${short.text}</div>
                            <input type="text" class="fill-input" data-correct="${short.answer.toLowerCase()}">
                        </div>`;
            });
            html += `</div>`;
        }
        
        // vocabulary and collocation (display)
        if (caseData.vocabCollocation) {
            html += `<div class="question-group"><h4>VOCABULARY & COLLOCATION</h4>
                        <div style="background:#f9f9ea; padding:0.8rem; border-left:4px solid black;">${caseData.vocabCollocation}</div>
                    </div>`;
        }
        
        questionsContainer.innerHTML = html;
        feedbackDiv.innerHTML = ''; // reset feedback
    }

    // ---- CHECK ANSWERS: only if all questions are answered-----
    function checkAllAnswers() {
        // get all question widgets: radio groups (each group must have one selected), matching selects must have non-empty, fill inputs must not be empty
        let allAnswered = true;
        const radioGroups = new Set();
        document.querySelectorAll('input[type="radio"]').forEach(radio => {
            const name = radio.getAttribute('name');
            if (name) radioGroups.add(name);
        });
        // for each radio group, check at least one checked
        for (let groupName of radioGroups) {
            const checked = document.querySelector(`input[name="${groupName}"]:checked`);
            if (!checked) {
                allAnswered = false;
                break;
            }
        }
        // check matching selects
        const matchSelects = document.querySelectorAll('.match-select');
        for (let sel of matchSelects) {
            if (!sel.value) {
                allAnswered = false;
                break;
            }
        }
        // check fill inputs
        const fillInputs = document.querySelectorAll('.fill-input');
        for (let inp of fillInputs) {
            if (!inp.value.trim()) {
                allAnswered = false;
                break;
            }
        }
        
        if (!allAnswered) {
            feedbackDiv.innerHTML = '<div class="warning-note">⚠️ CHECK FAILED: Please answer all questions before verification.</div>';
            return false;
        }
        return true;
    }
    
    // Evaluate answers and display results
    function evaluateAnswers() {
        if (!checkAllAnswers()) return;
        
        let resultHtml = '<div><strong>RESULT VERIFICATION</strong><br>';
        let correctCount = 0;
        let totalCount = 0;
        
        // MCQ evaluation
        const mcqItems = document.querySelectorAll('.question-item[data-type="mcq"]');
        mcqItems.forEach(item => {
            totalCount++;
            const idx = item.getAttribute('data-idx');
            const correctAns = item.getAttribute('data-answer');
            const selectedRadio = item.querySelector(`input[type="radio"]:checked`);
            const userChoice = selectedRadio ? selectedRadio.value : '';
            if (userChoice === correctAns) {
                correctCount++;
                resultHtml += `✅ MCQ "${item.querySelector('.question-text').innerText}": correct (${correctAns})<br>`;
            } else {
                resultHtml += `❌ MCQ "${item.querySelector('.question-text').innerText}": wrong (your: ${userChoice || 'none'}, correct: ${correctAns})<br>`;
            }
        });
        
        // Matching evaluation
        const matchItems = document.querySelectorAll('.question-item select.match-select');
        matchItems.forEach(select => {
            totalCount++;
            const correctAns = select.getAttribute('data-correct');
            const selectedVal = select.value;
            const parentDiv = select.closest('.question-item');
            const qText = parentDiv.querySelector('.question-text').innerText;
            if (selectedVal === correctAns) {
                correctCount++;
                resultHtml += `✅ Matching "${qText}": correct (${correctAns})<br>`;
            } else {
                resultHtml += `❌ Matching "${qText}": you selected "${selectedVal}", correct: ${correctAns}<br>`;
            }
        });
        
        // Fill-in blanks (completion, sentenceCompletion, shortAnswer all share .fill-input)
        const allFill = document.querySelectorAll('.fill-input');
        allFill.forEach(inp => {
            totalCount++;
            const userVal = inp.value.trim().toLowerCase();
            const correctVal = inp.getAttribute('data-correct');
            const parentDiv = inp.closest('.question-item');
            const qText = parentDiv.querySelector('.question-text').innerText;
            if (userVal === correctVal) {
                correctCount++;
                resultHtml += `✅ Fill: "${qText}" – correct (${correctVal})<br>`;
            } else {
                resultHtml += `❌ Fill: "${qText}" – your: "${userVal || 'empty'}", expected: "${correctVal}"<br>`;
            }
        });
        
        resultHtml += `<hr><strong>Total: ${correctCount} / ${totalCount} correct</strong>`;
        if (correctCount === totalCount) resultHtml += `<br><span style="font-weight:bold;">★ PERFECT SCORE ★</span>`;
        resultHtml += `</div>`;
        feedbackDiv.innerHTML = resultHtml;
    }
    
    // ---- event listeners for dropdowns ----
    function updatePart() {
        currentPartKey = partSelect.value;
        // For demo, only part3 has extended data; for other parts we still show placeholder but structure is there
        if (currentPartKey !== 'part3') {
            // for parts 1,2,4 we need to show that content not yet loaded
            // For simplicity, we set a dummy topic structure
            if (!LISTENING_DB[currentPartKey] || Object.keys(LISTENING_DB[currentPartKey].topics).length === 0) {
                LISTENING_DB[currentPartKey] = { name: `Part ${currentPartKey.slice(-1)}`, topics: { "Demo Topic": { cases: { "Case 1 – example": { script: "Script for part "+currentPartKey+" will be added later.", questions: { mcq: [], matching: {}, completion: [] }, vocabCollocation: "placeholder" } } } } };
            }
        }
        // set to first topic in the part
        const firstTopic = Object.keys(LISTENING_DB[currentPartKey].topics)[0];
        if (firstTopic) currentTopicName = firstTopic;
        populateTopics();
    }
    
    function updateTopic() {
        const newTopic = topicSelect.value;
        if (newTopic) currentTopicName = newTopic;
        populateCases();
    }
    
    function updateCase() {
        currentCaseKey = caseSelect.value;
        renderCurrentCase();
        feedbackDiv.innerHTML = '';
    }
    
    partSelect.addEventListener('change', updatePart);
    topicSelect.addEventListener('change', updateTopic);
    caseSelect.addEventListener('change', updateCase);
    document.getElementById('checkAnswersBtn').addEventListener('click', evaluateAnswers);
    
    // initialise
    populateParts();
    // set initial topic and case defaults
    currentTopicName = topicNames[0];
    currentCaseKey = "Case 1 – Carbon footprint survey";
    populateTopics();   // this internally calls renderCurrentCase()
    
    // manual sync
    renderCurrentCase();
</script>
